<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESAB Rosetta - Advanced Claims Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FFD700;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --gray: #6c757d;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            min-height: 100vh;
        }

        /* LOGIN */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #000 0%, #0a0e27 50%, #1a1a3e 100%);
            position: relative;
            overflow: hidden;
        }
        .login-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle 800px at 20% 50%, rgba(255,215,0,0.1) 0%, transparent 50%),
                radial-gradient(circle 600px at 80% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: orbitBg 20s linear infinite;
            z-index: 0;
        }
        @keyframes orbitBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .login-container {
            position: relative;
            z-index: 2;
            display: flex;
            width: 100%;
            height: 100vh;
            background: transparent;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            padding: 0;
            justify-content: center;
            align-items: center;
        }
        .login-left {
            flex: 0 0 auto;
            background: rgba(20, 20, 40, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 100px;
            color: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.15), inset 0 1px 0 rgba(255,255,255,0.1);
            min-height: auto;
            position: relative;
            max-width: 500px;
        }
        .login-logo-large {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary) 0%, #ffed4e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            font-weight: 900;
            color: #000;
            margin-bottom: 45px;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.3);
            border: 4px solid rgba(255,255,255,0.95);
            position: relative;
            z-index: 3;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .login-logo-large:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 80px rgba(255, 215, 0, 0.6), 0 0 50px rgba(255, 215, 0, 0.4);
        }
        .login-left h1 {
            font-size: 42px;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            line-height: 1.1;
        }
        .login-left h2 {
            font-size: 13px;
            text-align: center;
            letter-spacing: 2.5px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 50px;
            opacity: 0.9;
            text-transform: uppercase;
        }
        .login-left p {
            font-size: 11px;
            opacity: 0.7;
            text-align: center;
            line-height: 1.8;
            color: #999;
            max-width: 280px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
        }
        .form-group label {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 700;
            font-size: 20px;
            margin: 0;
            min-width: 28px;
            flex-shrink: 0;
        }
        .form-group input[type="text"],
        .form-group input[type="password"] {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 0;
            font-size: 14px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 500;
            width: auto;
        }
        .form-group input[type="text"]:focus,
        .form-group input[type="password"]:focus {
            outline: none;
            background: transparent;
            border-bottom-color: var(--primary);
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.2);
        }
        .form-group input[type="text"]::placeholder,
        .form-group input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 35px 0;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
            border-radius: 4px;
        }
        .checkbox-group label {
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            margin: 0;
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0;
            transition: color 0.3s;
        }
        .checkbox-group:hover label {
            color: #ddd;
        }
        .login-buttons {
            display: flex;
            gap: 14px;
            margin-top: 50px;
        }
        .btn-login {
            flex: 1;
            padding: 16px 24px;
            background: transparent;
            color: #fff;
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 215, 0, 0.1);
            transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }
        .btn-login:hover {
            border-color: rgba(255, 215, 0, 0.6);
            color: var(--primary);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.25);
        }
        .btn-login:hover::before {
            left: 0;
        }
        .btn-login.primary {
            background: linear-gradient(135deg, var(--primary) 0%, #ffed4e 100%);
            color: #000;
            border: none;
            font-weight: 800;
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.4);
        }
        .btn-login.primary:hover {
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.6);
            transform: translateY(-4px);
        }
        .login-footer {
            display: flex;
            gap: 36px;
            justify-content: center;
            margin-top: 55px;
            font-size: 10px;
            color: #888;
            letter-spacing: 1.2px;
        }
        .login-footer a {
            color: #999;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            position: relative;
            padding-bottom: 3px;
        }
        .login-footer a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--primary);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .login-footer a:hover {
            color: var(--primary);
        }
        .login-footer a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-container">
        <div class="login-left">
            <div class="login-logo-large">E</div>
            <h1>ESAB ROSETTA</h1>
            <h2>CLAIMS MANAGEMENT</h2>
            <p>Advanced Claims Management System for Global Manufacturing Excellence</p>

            <form onsubmit="login(event)" style="width: 100%;">
                <div class="form-group">
                    <label for="username">👤</label>
                    <input type="text" id="username" placeholder="Email" value="support@esabrosetta.com">
                </div>

                <div class="form-group">
                    <label for="password">🔐</label>
                    <input type="password" id="password" placeholder="Password" value="esabqa123">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>

                <div class="login-buttons">
                    <button type="button" class="btn-login" onclick="alert('Demo')">Cancel</button>
                    <button type="submit" class="btn-login primary">Sign In</button>
                </div>
            </form>

            <div class="login-footer">
                <a href="#">Help</a>
                <a href="#">Support</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </div>
</div>

<script>
    function login(e) {
        e.preventDefault();
        alert('✅ Login successful!\n\nDemo Features:\n- Premium glassmorphism design\n- Interactive dashboard\n- Claims management table\n- Form workflows\n- 7-tab ticket details system\n\nThis is a modernization proposal showing the future ESAB Rosetta application built with React/Next.js and Azure infrastructure.');
    }
</script>

</body>
</html>
